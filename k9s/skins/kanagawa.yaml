foreground: &foreground "#c5c9c5"
background: &background "#181616"
selection: &selection "#2d4f67"

black: &black "#0d0c0c"
red: &red "#c4746e"
bright_red: &bright_red "#e46876"

green: &green "#8a9a7b"
bright_green: &bright_green "#87a987"

yellow: &yellow "#c4b28a"
bright_yellow: &bright_yellow "#e6c384"

blue: &blue "#8ba4b0"
bright_blue: &bright_blue "#7fb4ca"

magenta: &magenta "#a292a3"
bright_magenta: &bright_magenta "#938aa9"

cyan: &cyan "#8ea4a2"
bright_cyan: &bright_cyan "#7aa89f"

white: &white "#c8c093"
bright_white: &bright_white "#c5c9c5"

k9s:
  body:
    fgColor: *foreground
    bgColor: *background
    logoColor: *bright_blue

  prompt:
    fgColor: *foreground
    bgColor: *background
    suggestColor: *bright_yellow

  info:
    fgColor: *bright_magenta
    sectionColor: *foreground

  help:
    fgColor: *foreground
    bgColor: *background
    keyColor: *bright_magenta
    numKeyColor: *bright_blue
    sectionColor: *bright_green

  dialog:
    fgColor: *foreground
    bgColor: *background
    buttonFgColor: *foreground
    buttonBgColor: *bright_magenta
    buttonFocusFgColor: *background
    buttonFocusBgColor: *bright_cyan
    labelFgColor: *bright_yellow
    fieldFgColor: *foreground

  frame:
    border:
      fgColor: *black
      focusColor: *bright_blue

    menu:
      fgColor: *foreground
      keyColor: *bright_magenta
      numKeyColor: *bright_magenta

    crumbs:
      fgColor: *foreground
      bgColor: *selection
      activeColor: *bright_blue

    status:
      newColor: *bright_cyan
      modifyColor: *bright_blue
      addColor: *bright_green
      errorColor: *bright_red
      highlightColor: *bright_yellow
      killColor: *black
      completedColor: *bright_green

    title:
      fgColor: *foreground
      bgColor: *background
      highlightColor: *bright_yellow
      counterColor: *bright_blue
      filterColor: *bright_magenta

  views:
    charts:
      bgColor: *background
      defaultDialColors:
        - *bright_blue
        - *bright_red
      defaultChartColors:
        - *bright_blue
        - *bright_red

    table:
      fgColor: *foreground
      bgColor: *background
      cursorFgColor: *background
      cursorBgColor: *bright_white
      header:
        fgColor: *bright_white
        bgColor: *background
        sorterColor: *selection

    xray:
      fgColor: *foreground
      bgColor: *background
      cursorColor: *bright_blue
      graphicColor: *bright_blue
      showIcons: false

    yaml:
      keyColor: *bright_magenta
      colonColor: *bright_blue
      valueColor: *foreground

    logs:
      fgColor: *foreground
      bgColor: *background
      indicator:
        fgColor: *foreground
        bgColor: *background
